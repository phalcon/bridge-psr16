services:
  app:
    build:
      context: .
      dockerfile: resources/docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        PHALCON_VARIANT: ${PHALCON_VARIANT:-package}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${PROJECT_PREFIX:-bridge-psr16}-app
    hostname: ${PROJECT_PREFIX:-bridge-psr16}-app
    working_dir: /srv
    volumes:
      - .:/srv
